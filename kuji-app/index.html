<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#160A33">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<title>컴투스 팝업 쿠지</title>
<style>
  /* ════════ Com2uS Lucky Draw 디자인 시스템 토큰 (퍼플+골드) ════════ */
  @font-face{font-family:"Pretendard";font-weight:300;font-display:swap;src:local("Pretendard Light"),url("assets/fonts/Pretendard-Light.otf") format("opentype")}
  @font-face{font-family:"Pretendard";font-weight:400;font-display:swap;src:local("Pretendard Regular"),url("assets/fonts/Pretendard-Regular.otf") format("opentype")}
  @font-face{font-family:"Pretendard";font-weight:500;font-display:swap;src:local("Pretendard Medium"),url("assets/fonts/Pretendard-Medium.otf") format("opentype")}
  @font-face{font-family:"Pretendard";font-weight:600;font-display:swap;src:local("Pretendard SemiBold"),url("assets/fonts/Pretendard-SemiBold.otf") format("opentype")}
  @font-face{font-family:"Pretendard";font-weight:700;font-display:swap;src:local("Pretendard Bold"),url("assets/fonts/Pretendard-Bold.otf") format("opentype")}
  @font-face{font-family:"Pretendard";font-weight:800;font-display:swap;src:local("Pretendard ExtraBold"),url("assets/fonts/Pretendard-ExtraBold.otf") format("opentype")}
  @font-face{font-family:"Pretendard";font-weight:900;font-display:swap;src:local("Pretendard Black"),url("assets/fonts/Pretendard-Black.otf") format("opentype")}
  :root{
    --white:#FFFFFF;--ink-900:#000;--ink-700:#333;--ink-500:#666;--ink-400:#999;
    --line-300:#DDD;--paper-0:#FAFAFC;
    --brand-red:#DC2828;--brand-red-strong:#E40521;--brand-vivid:#FF2E24;
    --purple-950:#160A33;--purple-900:#1E0F45;--purple-800:#2A1860;--purple-700:#3D2585;--purple-600:#5A33B5;--purple-500:#7B3FE4;--purple-400:#9B6BF0;--purple-300:#C0A3F7;
    --gold-700:#B8860B;--gold-600:#F2A800;--gold-500:#FFC93C;--gold-400:#FFD84D;--gold-300:#FFE588;--gold-ink:#5A3D00;
    --grade-a:#F0B41E;--grade-a-deep:#C5860C;--grade-b:#3B82E0;--grade-b-deep:#1E55B8;--grade-c:#46A63F;--grade-c-deep:#2C7A28;--grade-d:#8B4FD8;--grade-d-deep:#6128B0;--grade-e:#C97B3C;--grade-e-deep:#9A5621;--grade-f:#23A39A;--grade-f-deep:#137C75;--grade-special:#9B5FE0;--grade-special-deep:#6F33C0;--grade-lucky:#FFD24D;--grade-lucky-deep:#D99A14;
    --ticket-fill:#F2A015;--ticket-empty:#DDD;--danger:#DC2828;--soldout:#8A8A93;
    --surface-card:var(--white);--surface-glass:rgba(255,255,255,.07);--surface-glass-line:rgba(255,255,255,.16);
    --text-strong:var(--ink-900);--text-muted:var(--ink-500);--text-faint:var(--ink-400);
    --font-sans:"Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,"Noto Sans KR",sans-serif;
    --r-sm:8px;--r-md:12px;--r-lg:20px;--r-xl:28px;--r-2xl:36px;--r-pill:999px;
    --shadow-card:0 10px 28px rgba(11,4,34,.28);--shadow-pop:0 24px 64px rgba(8,2,28,.55);--shadow-inset-top:inset 0 2px 0 rgba(255,255,255,.55);
    --glow-purple:0 0 0 1px rgba(155,107,240,.55),0 0 24px rgba(123,63,228,.55),0 0 56px rgba(123,63,228,.30);
    --glow-gold:0 0 28px rgba(255,201,60,.55),0 6px 18px rgba(242,168,0,.45);--glow-gold-sm:0 0 14px rgba(255,201,60,.5);
    --grad-stage:radial-gradient(120% 90% at 50% 28%,#3D2585 0%,#2A1860 38%,#1E0F45 68%,#160A33 100%);
    --grad-gold:linear-gradient(180deg,#FFE588 0%,#FFD14A 42%,#F8B521 72%,#F2A800 100%);
    --grad-gold-press:linear-gradient(180deg,#F8B521 0%,#F2A800 60%,#D99500 100%);
    --grad-lucky:linear-gradient(135deg,#FFE9A8 0%,#FFD24D 45%,#E9A41C 100%);
    --grad-frame:linear-gradient(160deg,#9B6BF0 0%,#7B3FE4 50%,#5A33B5 100%);
    --prize-well:linear-gradient(160deg,#F4F1FA,#ECE7F6);
    --ease-inout:cubic-bezier(.65,0,.35,1);
  }
  @keyframes ld-pulse-glow{0%,100%{box-shadow:var(--shadow-inset-top),0 0 18px rgba(255,201,60,.45),0 6px 18px rgba(242,168,0,.4)}50%{box-shadow:var(--shadow-inset-top),0 0 34px rgba(255,201,60,.85),0 8px 24px rgba(242,168,0,.55)}}
  @keyframes ld-twinkle{0%,100%{opacity:.35;transform:translateY(-50%) scale(.8) rotate(0)}50%{opacity:1;transform:translateY(-50%) scale(1.15) rotate(45deg)}}

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
  html, body { height:100%; overscroll-behavior:none; }
  body {
    font-family:var(--font-sans);
    background:var(--purple-950); display:flex; justify-content:center;
    overflow:hidden; user-select:none; touch-action:manipulation;
  }
  #kiosk {
    width:100%; max-width:520px; height:100vh; height:100dvh;
    background:var(--grad-stage);
    position:relative; overflow:hidden; box-shadow:0 0 60px rgba(0,0,0,.6);
  }
  /* 무대 별가루 (faint star field) */
  #kiosk::before { content:""; position:absolute; inset:0; pointer-events:none; z-index:0; opacity:.5;
    background-image:
      radial-gradient(1.5px 1.5px at 18% 12%,rgba(255,255,255,.8),transparent),
      radial-gradient(1.5px 1.5px at 72% 22%,rgba(255,255,255,.6),transparent),
      radial-gradient(1.5px 1.5px at 40% 78%,rgba(255,255,255,.5),transparent),
      radial-gradient(1.5px 1.5px at 86% 64%,rgba(255,255,255,.6),transparent),
      radial-gradient(1.5px 1.5px at 60% 90%,rgba(255,255,255,.4),transparent); }
  .screen { position:absolute; inset:0; display:none; flex-direction:column; animation:fadeIn .35s ease; z-index:1; }
  .screen.active { display:flex; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

  /* 공통 */
  .btn { border:none; cursor:pointer; font-weight:900; font-family:inherit; border-radius:var(--r-pill); transition:transform .12s,filter .15s; }
  .btn:active { transform:scale(.97); filter:brightness(1.04); }
  .btn-yellow { position:relative; display:block; background:var(--grad-gold); color:var(--gold-ink); font-size:20px; letter-spacing:-.01em; padding:18px 0; width:78%; margin:0 auto; border-radius:var(--r-pill); box-shadow:var(--shadow-inset-top),var(--glow-gold); overflow:hidden; animation:ld-pulse-glow 1.8s var(--ease-inout) infinite; }
  .btn-yellow::before,.btn-yellow::after { content:"✦"; position:absolute; top:50%; transform:translateY(-50%); color:rgba(255,255,255,.85); font-size:.72em; pointer-events:none; animation:ld-twinkle 1.6s ease-in-out infinite; }
  .btn-yellow::before { left:9% } .btn-yellow::after { right:9%; animation-delay:.8s }
  .btn-yellow:active { background:var(--grad-gold-press); }
  .btn-yellow:disabled { background:linear-gradient(180deg,#cfc8d6,#b3aabb); color:#7a7580; filter:none; box-shadow:none; cursor:default; animation:none; }
  .btn-yellow:disabled::before,.btn-yellow:disabled::after { display:none }
  .btn-ghost { background:var(--surface-glass); color:#fff; font-size:14px; padding:10px 22px; border:1.5px solid var(--surface-glass-line); }
  .topbar { background:rgba(8,2,28,.42); backdrop-filter:blur(4px); padding:14px 16px; color:#fff; font-size:15px; font-weight:700; flex-shrink:0; display:flex; align-items:center; gap:10px; position:relative; z-index:2; }
  .topbar .back { background:var(--surface-glass); border:1.5px solid var(--surface-glass-line); color:#fff; width:40px; height:40px; min-width:40px; border-radius:50%; font-size:20px; cursor:pointer; }
  .topbar .back:active { transform:scale(.94); }
  .topbar .title { flex:1; line-height:1.3; }
  .topbar .title em { color:var(--gold-400); font-style:normal; font-weight:800; }
  .topbar .title small { display:block; font-weight:400; font-size:11px; opacity:.75; margin-top:3px; }
  /* S1 브랜드 텍스트 스택 (박스 없이 — 영상 위 가독성용 그림자) */
  .idle-brand { display:flex; flex-direction:column; align-items:center; gap:14px; text-align:center; padding:0 24px; }
  .idle-wordmark { width:200px; height:auto; filter:drop-shadow(0 2px 12px rgba(0,0,0,.6)); }
  .idle-headline { color:#fff; font-weight:900; line-height:.98; letter-spacing:-.01em; }
  .idle-headline .ld-1 { display:block; font-size:48px; text-shadow:0 3px 16px rgba(0,0,0,.72),0 1px 3px rgba(0,0,0,.6); }
  .idle-headline .ld-2 { display:block; font-size:60px; color:var(--gold-400); text-shadow:0 3px 16px rgba(0,0,0,.72),0 2px 12px rgba(242,168,0,.45); }
  .idle-sub { font-size:18px; font-weight:700; color:rgba(255,255,255,.94); text-shadow:0 2px 10px rgba(0,0,0,.75); }
  .idle-sub:empty { display:none; }
  .img-fallback { display:flex; align-items:center; justify-content:center; background:var(--prize-well); color:var(--purple-600); font-weight:800; }
  /* 등급 엠블럼 (공유) — data-tone으로 등급별 색 */
  .grade,.r-grade,.rc-grade { --g-from:#FFE9A8;--g-mid:var(--grade-a);--g-to:var(--grade-a-deep);
    border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; color:#fff; letter-spacing:-.02em; text-shadow:0 1px 2px rgba(0,0,0,.4);
    background:radial-gradient(circle at 36% 27%,rgba(255,255,255,.85) 0%,var(--g-from) 22%,var(--g-mid) 52%,var(--g-to) 86%);
    box-shadow:0 0 0 3px var(--g-to),0 0 0 4px rgba(255,255,255,.7),inset 0 2px 4px rgba(255,255,255,.6),inset 0 -5px 8px rgba(0,0,0,.34),0 6px 14px rgba(11,4,34,.4); }
  [data-tone="a"]{--g-from:#FFE9A8;--g-mid:var(--grade-a);--g-to:var(--grade-a-deep)}
  [data-tone="b"]{--g-from:#C4E3FF;--g-mid:var(--grade-b);--g-to:var(--grade-b-deep)}
  [data-tone="c"]{--g-from:#C2F0B9;--g-mid:var(--grade-c);--g-to:var(--grade-c-deep)}
  [data-tone="d"]{--g-from:#E3CCFF;--g-mid:var(--grade-d);--g-to:var(--grade-d-deep)}
  [data-tone="e"]{--g-from:#F6D2AC;--g-mid:var(--grade-e);--g-to:var(--grade-e-deep)}
  [data-tone="f"]{--g-from:#ACEEE8;--g-mid:var(--grade-f);--g-to:var(--grade-f-deep)}
  [data-tone="special"]{--g-from:#E7CCFF;--g-mid:var(--grade-special);--g-to:var(--grade-special-deep)}
  [data-tone="lucky"]{--g-from:#FFEAB0;--g-mid:var(--grade-lucky);--g-to:var(--grade-lucky-deep)}

  /* S1 대기 */
  #scr-idle { justify-content:center; align-items:center; cursor:pointer; gap:38px; }
  #idle-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  #scr-idle > *:not(#idle-video):not(.bubbles):not(#admin-tap) { position:relative; z-index:2; }
  #scr-idle .touch-banner { background:rgba(8,2,28,.64); border:1px solid rgba(255,255,255,.30); color:#fff; font-size:18px; font-weight:800; padding:15px 36px; border-radius:var(--r-pill); text-shadow:0 1px 4px rgba(0,0,0,.6); backdrop-filter:blur(8px); animation:pulse 1.6s infinite; }
  @keyframes pulse { 0%{box-shadow:0 8px 24px rgba(0,0,0,.4),0 0 0 0 rgba(255,201,60,.5)} 70%{box-shadow:0 8px 24px rgba(0,0,0,.4),0 0 0 20px rgba(255,201,60,0)} 100%{box-shadow:0 8px 24px rgba(0,0,0,.4),0 0 0 0 rgba(255,201,60,0)} }
  #scr-idle.soldout .touch-banner { background:rgba(80,80,90,.5); border-color:rgba(255,255,255,.12); animation:none; }
  .bubbles { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:1; }
  .bubbles i { position:absolute; display:block; border-radius:50%; background:rgba(255,255,255,.08); animation:rise linear infinite; }
  @keyframes rise { from{transform:translateY(110vh)} to{transform:translateY(-20vh)} }
  #admin-tap { position:absolute; top:0; right:0; width:110px; height:110px; z-index:9; }
  #scr-idle .copyright { position:absolute; bottom:16px; font-size:11px; color:rgba(255,255,255,.5); }

  /* S2 IP 선택 — 풀블리드 배너 카드 (이미지 + 좌측 스크림 위 텍스트) */
  #ip-hero { flex-shrink:0; height:200px; position:relative; overflow:hidden; display:flex; align-items:flex-end; }
  #ip-hero img, #ip-hero .img-fallback { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; font-size:30px; }
  #ip-hero h1 { position:relative; z-index:2; color:#fff; font-size:26px; font-weight:900; padding:18px; text-shadow:0 3px 12px rgba(0,0,0,.8); background:linear-gradient(to top,rgba(0,0,0,.65),transparent); width:100%; }
  #ip-list { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:12px; }
  .ip-card { background:#1a1030; border-radius:var(--r-lg); overflow:hidden; color:#fff; cursor:pointer; border:1.5px solid var(--surface-glass-line); transition:transform .14s; display:block; height:118px; position:relative; box-shadow:var(--shadow-card); }
  .ip-card:active { transform:scale(.99); }
  .ip-card .ipimg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; font-size:40px; }
  .ip-card .ipinfo { position:absolute; inset:0; z-index:2; padding:0 56px 0 18px; display:flex; flex-direction:column; justify-content:center; gap:6px; background:linear-gradient(90deg,rgba(8,2,28,.88) 0%,rgba(8,2,28,.62) 40%,rgba(8,2,28,.05) 72%,transparent 100%); }
  .ip-card .ipinfo h3 { font-size:21px; font-weight:800; line-height:1.15; word-break:keep-all; text-shadow:0 2px 8px rgba(0,0,0,.7); }
  .ip-card .ipinfo .stock { font-size:13px; color:rgba(255,255,255,.75); } .ip-card .ipinfo .stock b { color:var(--gold-400); font-size:22px; font-weight:900; }
  .ip-card .gauge { height:7px; width:60%; background:rgba(255,255,255,.18); border-radius:4px; overflow:hidden; margin-top:2px; }
  .ip-card .gauge i { display:block; height:100%; background:var(--grad-gold); }
  .ip-card::after { content:"›"; position:absolute; right:14px; top:50%; transform:translateY(-50%); z-index:2; width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,.16); border:1.5px solid rgba(255,255,255,.4); display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:800; color:#fff; }
  .ip-card.soldout { filter:grayscale(.9) brightness(.6); pointer-events:none; }
  .ip-card.soldout::after { display:none; }
  .ip-card .soldout-badge { position:absolute; top:10px; right:10px; z-index:3; background:var(--soldout); color:#fff; font-size:12px; font-weight:900; letter-spacing:.04em; padding:5px 12px; border-radius:var(--r-pill); display:none; }
  .ip-card.soldout .soldout-badge { display:block; }

  /* S3 경품 라인업 — 흰 카드 (등급 엠블럼 오버랩 + 이미지 좌 / 이름·게이지 우) */
  #prize-grid { flex:1; overflow-y:auto; padding:18px 14px; display:grid; grid-template-columns:1fr 1fr; gap:14px; align-content:start; }
  .prize-cell { display:flex; align-items:center; gap:12px; background:var(--surface-card); border-radius:var(--r-lg); border:1px solid rgba(255,255,255,.7); padding:14px 12px 14px 12px; position:relative; box-shadow:var(--shadow-card); }
  .prize-cell::after { content:"✦✦"; position:absolute; top:9px; right:12px; font-size:12px; letter-spacing:2px; color:rgba(123,63,228,.28); pointer-events:none; }
  .prize-cell.lucky { background:var(--grad-lucky); border-color:rgba(255,255,255,.6); box-shadow:var(--glow-gold-sm),var(--shadow-card); }
  .prize-cell.lucky::after { color:rgba(255,255,255,.7); }
  .prize-cell .grade { position:absolute; top:-10px; left:-8px; z-index:2; width:56px; height:56px; font-size:17px; }
  .prize-cell .grade[data-tone="special"] { font-size:11px; }
  .prize-cell.lucky .grade { font-size:12px; }
  .prize-cell .p-img { flex-shrink:0; width:104px; height:104px; border-radius:var(--r-md); object-fit:contain; background:var(--prize-well); font-size:46px; }
  .prize-cell .p-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:8px; }
  .prize-cell .p-name { font-size:15px; font-weight:800; color:var(--text-strong); line-height:1.3; word-break:keep-all; }
  .prize-cell.lucky .p-name { color:var(--gold-ink); }
  .prize-cell .p-stock { font-size:12px; color:var(--text-muted); }
  .prize-cell.lucky .p-stock { color:rgba(90,61,0,.8); }
  .prize-cell .p-stock b { color:var(--danger); font-size:15px; font-weight:800; }
  .ticket-gauge { display:flex; flex-wrap:wrap; gap:4px; }
  .ticket-gauge i { width:12px; height:15px; border-radius:3px; background:var(--ticket-empty); }
  .ticket-gauge i.on { background:var(--ticket-fill); box-shadow:inset 0 0 0 1px rgba(0,0,0,.08); }
  .prize-cell.out { filter:grayscale(.9); opacity:.55; }
  .prize-cell .out-badge { position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(40,38,48,.5); color:#fff; font-weight:900; font-size:20px; letter-spacing:.04em; border-radius:var(--r-lg); }
  .prize-cell.out .out-badge { display:flex; }
  .lineup-footer { flex-shrink:0; padding:14px 0 18px; background:rgba(8,2,28,.32); }
  .lineup-footer .hint { text-align:center; color:rgba(255,255,255,.82); font-size:12px; margin-bottom:12px; padding:0 16px; word-break:keep-all; }

  /* S4 뽑기 — 중앙 네온 프레임 박스 + NPC */
  #scr-draw { color:#fff; }
  #draw-stage { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; }
  #draw-box { position:relative; width:100%; max-width:380px; background:linear-gradient(120deg,#2A1860,#160A33); border:2px solid var(--purple-400); border-radius:var(--r-xl); padding:24px 22px 28px; text-align:center; box-shadow:var(--glow-purple); display:flex; flex-direction:column; align-items:center; gap:18px; animation:cardIn .5s cubic-bezier(.2,1.5,.4,1); }
  #draw-box::before,#draw-box::after { content:"✦"; position:absolute; top:12px; color:rgba(255,255,255,.8); font-size:16px; text-shadow:0 0 8px rgba(255,255,255,.6); animation:ld-twinkle2 2.2s ease-in-out infinite; }
  #draw-box::before { left:14px } #draw-box::after { right:14px; animation-delay:.7s }
  @keyframes ld-twinkle2 { 0%,100%{opacity:.35;transform:scale(.8) rotate(0)} 50%{opacity:1;transform:scale(1.15) rotate(45deg)} }
  #draw-box .npc-art { width:285px; height:285px; border-radius:var(--r-lg); overflow:hidden; font-size:108px; display:flex; align-items:center; justify-content:center; }
  #draw-box .npc-art img, #draw-box .npc-art video { width:100%; height:100%; object-fit:cover; border-radius:inherit; display:block; }
  #draw-box .draw-msg { font-size:17px; font-weight:700; color:#fff; }
  #ticket-box { flex:1; width:100%; display:flex; flex-wrap:wrap; gap:14px; align-content:center; justify-content:center; padding:16px 28px; }
  .ticket { width:66px; height:90px; border-radius:var(--r-sm); cursor:pointer; background:linear-gradient(180deg,#FDF6E3,#F5E6BD); border:2px dashed var(--gold-700); display:flex; align-items:center; justify-content:center; font-size:26px; color:var(--gold-700); font-weight:900; box-shadow:0 4px 10px rgba(0,0,0,.35); transition:transform .15s; animation:wobble 2.4s ease-in-out infinite; }
  .ticket:nth-child(2n){animation-delay:.4s} .ticket:nth-child(3n){animation-delay:.9s}
  @keyframes wobble { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
  .ticket:active { transform:scale(1.15); }
  .ticket.disabled { pointer-events:none; }
  .ticket.opening { animation:ticketOpen .5s forwards; }
  @keyframes ticketOpen { to{transform:scale(2.4);opacity:0} }

  /* S5 당첨 연출 */
  #scr-reveal { justify-content:center; align-items:center; gap:10px; color:#fff; }
  #reveal-card { width:250px; min-height:330px; border-radius:var(--r-xl); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:22px; background:#fff; color:var(--text-strong); animation:cardIn .55s cubic-bezier(.2,1.6,.4,1); box-shadow:var(--glow-gold-sm),var(--shadow-pop); }
  @keyframes cardIn { from{transform:scale(.2) rotate(-12deg);opacity:0} to{transform:none;opacity:1} }
  #reveal-card .r-grade { width:84px; height:84px; font-size:26px; }

<body>
<div id="kiosk">

<script>
/* ════════════════ 저장소 키 ════════════════ */
const K_CFG='kuji.config.v1', K_STOCK='kuji.stock.v1', K_LOG='kuji.log.v1';

/* ════════════════ 기본 설정 (관리자 미설정 시) ════════════════ */
function defaultConfig(){
  return {
    eventName:'컴투스 팝업 쿠지', adminPin:'0000', idleTimeoutSec:30, muted:false, npcs:[],
    ips:[{
      id:'ip1', name:'서머너즈 워 컬렉션', heroImageKey:null,
      lastOne:{ name:'스토어 할인 쿠폰', imageKey:null },
      prizes:[
        { grade:'A상', name:'발키리 피규어', imageKey:null, count:2,  tier:'high' },
        { grade:'B상', name:'이프리트 피규어', imageKey:null, count:3,  tier:'high' },
        { grade:'C상', name:'빅 쿠션', imageKey:null, count:5,  tier:'high' },
        { grade:'D상', name:'아크릴 스탠드(랜덤)', imageKey:null, count:10, tier:'normal' },
        { grade:'E상', name:'스티커 세트', imageKey:null, count:20, tier:'normal' },
      ],
    }],
  };
}

/* ════════════════ 설정/재고/로그 로드·저장 ════════════════ */
let cfg = loadCfg(), stock = loadStock(), logArr = loadLog();
function loadCfg(){ try{ const r=localStorage.getItem(K_CFG); if(r) return JSON.parse(r);}catch(e){} return defaultConfig(); }
function saveCfg(){ try{ localStorage.setItem(K_CFG, JSON.stringify(cfg)); }catch(e){} }
function freshStock(){ const s={}; cfg.ips.forEach(ip=> s[ip.id]=ip.prizes.map(p=>+p.count||0)); return s; }
function loadStock(){
  try{ const r=localStorage.getItem(K_STOCK); if(r){ const s=JSON.parse(r); return s; } }catch(e){}
  return freshStock();
}
function saveStock(){ try{ localStorage.setItem(K_STOCK, JSON.stringify(stock)); }catch(e){} }
function loadLog(){ try{ const r=localStorage.getItem(K_LOG); if(r) return JSON.parse(r);}catch(e){} return []; }
function saveLog(){ try{ localStorage.setItem(K_LOG, JSON.stringify(logArr)); }catch(e){} }
/* 설정과 재고 정합성 보정 (등급 수가 바뀐 IP는 재고 배열 맞춤) */
function reconcileStock(){
  let changed=false;
  cfg.ips.forEach(ip=>{
    if(!Array.isArray(stock[ip.id]) || stock[ip.id].length!==ip.prizes.length){
      stock[ip.id]=ip.prizes.map(p=>+p.count||0); changed=true;
    }
  });
  Object.keys(stock).forEach(id=>{ if(!cfg.ips.find(ip=>ip.id===id)){ delete stock[id]; changed=true; } });
  if(changed) saveStock();
}
function remainOf(ip){ return (stock[ip.id]||[]).reduce((a,b)=>a+b,0); }
function totalOf(ip){ return ip.prizes.reduce((a,p)=>a+(+p.count||0),0); }
function totalRemainAll(){ return cfg.ips.reduce((a,ip)=>a+remainOf(ip),0); }

/* ════════════════ IndexedDB 이미지/미디어 저장 ════════════════ */
let idb=null;
function openIDB(){ return new Promise((res)=>{ const rq=indexedDB.open('kuji-media',1);
  rq.onupgradeneeded=()=>{ rq.result.createObjectStore('media'); };
  rq.onsuccess=()=>{ idb=rq.result; res(idb); }; rq.onerror=()=>res(null); }); }
function idbPut(key,val){ return new Promise((res)=>{ if(!idb)return res(); const tx=idb.transaction('media','readwrite'); tx.objectStore('media').put(val,key); tx.oncomplete=()=>res(); tx.onerror=()=>res(); }); }
function idbGet(key){ return new Promise((res)=>{ if(!idb||!key)return res(null); const tx=idb.transaction('media','readonly'); const rq=tx.objectStore('media').get(key); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>res(null); }); }
function idbDel(key){ return new Promise((res)=>{ if(!idb||!key)return res(); const tx=idb.transaction('media','readwrite'); tx.objectStore('media').delete(key); tx.oncomplete=()=>res(); tx.onerror=()=>res(); }); }

/* 이미지 캐시(dataURL) — 부팅 시 config가 참조하는 모든 키 로드 */
const imgCache={};
async function loadAllImages(){
  const keys=new Set();
  cfg.ips.forEach(ip=>{ if(ip.heroImageKey)keys.add(ip.heroImageKey); if(ip.lastOne&&ip.lastOne.imageKey)keys.add(ip.lastOne.imageKey); ip.prizes.forEach(p=>{ if(p.imageKey)keys.add(p.imageKey); }); });
  for(const k of keys){ imgCache[k]=await idbGet(k); }
}
/* img 또는 fallback 마크업 */
function imgTag(key, cls, emoji){
  const src=key?imgCache[key]:null;
  if(src) return `<img class="${cls}" src="${src}" alt="">`;
  return `<div class="${cls} img-fallback">${emoji||'🎁'}</div>`;
}

/* ════════════════ 화면 전환 + 30초 유휴 ════════════════ */
let currentScreen='scr-idle', idleTimer=null, idleScreens=['scr-ip','scr-lineup','scr-result'];
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentScreen=id;
  manageIdle();
}
function manageIdle(){
  clearTimeout(idleTimer);
  if(idleScreens.includes(currentScreen)){
    idleTimer=setTimeout(resetToIdle, (cfg.idleTimeoutSec||30)*1000);
  }
}
function resetIdle(){ if(idleScreens.includes(currentScreen)) manageIdle(); }
document.getElementById('kiosk').addEventListener('pointerdown', resetIdle, true);

/* ════════════════ S1 대기 ════════════════ */
let curIp=null, drawing=false, lastResult=null, lastNpcId=null;
async function bootIdle(){
  document.getElementById('idle-sub').textContent = cfg.eventName || '';
  // 대기 영상
  const vid=await idbGet('idle_video'); const v=document.getElementById('idle-video');
  if(v._ourl){ try{ URL.revokeObjectURL(v._ourl); }catch(e){} v._ourl=null; }
  if(vid){ try{ const src=(typeof vid==='string')?vid:(v._ourl=URL.createObjectURL(vid)); v.src=src; v.style.display='block'; v.play().catch(()=>{}); }catch(e){ v.style.display='none'; } }

async function renderDrawBox(){

/* 추첨 원자 처리 — 단일 버튼, 연타 방지 */
function pickDraw(){
  if(drawing) return;

  const btn=document.getElementById('draw-go-btn'); if(btn) btn.disabled=true;

  const arr=stock[curIp.id]; const pool=[];
  arr.forEach((c,i)=>{ for(let k=0;k<c;k++) pool.push(i); });
  const idx=pool[Math.floor(Math.random()*pool.length)];
  arr[idx]--; saveStock();
  const prize=curIp.prizes[idx];
  // 행운상: 이 등급의 마지막 1개를 뽑은 경우 (스토어 할인 쿠폰 현장 지급)
  const isLucky = arr[idx]===0 && !!(curIp.lastOne && curIp.lastOne.name);
  const serial = nextSerial();
  logArr.push({ timestamp:new Date().toISOString(), ipId:curIp.id, ipName:curIp.name, grade:prize.grade, prizeName:prize.name, isLastOne:isLucky, luckyGrade:isLucky?prize.grade:'', serial }); saveLog();

function nextSerial(){
  const today=dateKey(new Date());
  const n=logArr.filter(l=>dateKey(new Date(l.timestamp))===today).length;

}
function dateKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

/* ════════════════ 사운드 (효과음=WebAudio 합성, BGM=업로드 파일) ════════════════ */
let actx=null; function audioCtx(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
function tone(freq,dur,type,vol,delay){ const c=audioCtx(); if(!c||cfg.muted)return; const t=c.currentTime+(delay||0); const o=c.createOscillator(),g=c.createGain(); o.type=type||'sine'; o.frequency.value=freq; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol||.2,t+.01); g.gain.exponentialRampToValueAtTime(.001,t+dur); o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+dur); }
/* 효과음: 업로드 파일 우선, 없으면 기본 합성음(WebAudio) 폴백 */
const sfxEl={ pick:new Audio(), win:new Audio(), special:new Audio() }; const sfxUrls={};
async function loadSfx(){ for(const k of ['pick','win','special']){ const d=await idbGet('sfx_'+k); if(d){ if(sfxUrls[k]){try{URL.revokeObjectURL(sfxUrls[k]);}catch(e){}} sfxEl[k].src=(typeof d==='string')?d:(sfxUrls[k]=URL.createObjectURL(d)); } } }
function playSfx(kind){
  if(cfg.muted)return;
  const slot={pick:'pick',win:'win',fanfare:'special'}[kind];
  const a=slot&&sfxEl[slot];
  if(a&&a.src){ try{ a.currentTime=0; a.volume=.8; a.play().catch(()=>{}); return; }catch(e){} }
  // 폴백: 기본 합성음
  if(kind==='pick'){ tone(660,.12,'triangle',.18); }
  else if(kind==='win'){ tone(523,.18,'sine',.2); tone(784,.25,'sine',.18,.12); }
  else if(kind==='fanfare'){ [523,659,784,1047].forEach((f,i)=>tone(f,.3,'sawtooth',.16,i*.11)); tone(1047,.5,'sine',.14,.5); }
}
/* BGM: 화면별 3슬롯 (대기 / 선택 / 뽑기), 루핑 */
const bgmEl={ idle:new Audio(), select:new Audio(), play:new Audio() }; Object.values(bgmEl).forEach(a=>a.loop=true); let curBgm=null; const bgmUrls={};
async function loadBgm(){ for(const slot of ['idle','select','play']){ const d=await idbGet('bgm_'+slot); if(d){ if(bgmUrls[slot]){try{URL.revokeObjectURL(bgmUrls[slot]);}catch(e){}} bgmEl[slot].src=(typeof d==='string')?d:(bgmUrls[slot]=URL.createObjectURL(d)); } } }
function startBgm(slot){ if(curBgm&&curBgm!==slot){ try{bgmEl[curBgm].pause();}catch(e){} } curBgm=slot; if(cfg.muted)return; const a=bgmEl[slot]; if(a&&a.src){ a.volume=.4; a.play().catch(()=>{}); } }
function applyMute(){ if(cfg.muted){ Object.values(bgmEl).forEach(a=>{try{a.pause();}catch(e){}});} else if(curBgm){ startBgm(curBgm); } }

  const root=document.getElementById('pane-stock'); let html=`<div class="adm-card"><h4>전체 잔여: ${totalRemainAll()}장</h4>`;
  cfg.ips.forEach(ip=>{
    html+=`<div style="margin:10px 0 4px;font-weight:700">${esc(ip.name)} — 잔여 ${remainOf(ip)}/${totalOf(ip)}</div><table class="adm-tbl"><tr><th>등급</th><th>경품</th><th>잔여/초기</th></tr>`;
    ip.prizes.forEach((p,i)=>{ html+=`<tr><td>${esc(p.grade)}</td><td>${esc(p.name)}</td><td>${stock[ip.id]?stock[ip.id][i]:0} / ${p.count}</td></tr>`; });
    html+=`</table>`;
  });
  html+=`</div><button class="adm-btn dng" style="width:100%;padding:14px" onclick="admResetStock()">⚠️ 재고 전체 리셋</button>`;
  root.innerHTML=html;
}
function admResetStock(){ if(confirm('재고를 초기 수량으로 되돌릴까요?')){ if(confirm('정말 초기화하시겠습니까? (되돌릴 수 없음)')){ stock=freshStock(); saveStock(); toast('재고 초기화 완료'); renderAdmStock(); } } }

/* 당첨 로그 + CSV */
function renderAdmLog(){
  const root=document.getElementById('pane-log');
  const today=dateKey(new Date()); const todayCnt=logArr.filter(l=>dateKey(new Date(l.timestamp))===today).length;
  let html=`<div class="adm-card"><h4>당첨 로그 (총 ${logArr.length}건 · 오늘 ${todayCnt}건)</h4>
    <button class="adm-btn pri" onclick="exportCsv()">📄 CSV 내보내기</button>
    <button class="adm-btn dng" style="float:right" onclick="admClearLog()">로그 삭제</button>
    <table class="adm-tbl" style="margin-top:10px"><tr><th>#</th><th>시각</th><th>IP</th><th>등급</th><th>경품</th></tr>`;
  logArr.slice(-50).reverse().forEach(l=>{ const t=new Date(l.timestamp); html+=`<tr><td>${l.serial||''}</td><td>${String(t.getMonth()+1).padStart(2,'0')}/${String(t.getDate()).padStart(2,'0')} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}</td><td>${esc(l.ipName)}</td><td>${esc(l.grade)}${l.isLastOne?' +LO':''}</td><td>${esc(l.prizeName)}</td></tr>`; });
  html+=`</table><div class="muted-note">최근 50건 표시 · CSV는 전체</div></div>`;
  root.innerHTML=html;
}
function exportCsv(){
  const rows=[['serial','timestamp','ipId','ipName','grade','prizeName','isLastOne']];
  logArr.forEach(l=>rows.push([l.serial||'',l.timestamp,l.ipId,l.ipName,l.grade,l.prizeName,l.isLastOne?'TRUE':'FALSE']));
  const csv='﻿'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`kuji-log-${dateKey(new Date()).replace(/-/g,'')}.csv`; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('CSV 다운로드');
}
function admClearLog(){ if(confirm('당첨 로그를 모두 삭제할까요? (CSV 백업 권장)')){ logArr=[]; saveLog(); toast('로그 삭제됨'); renderAdmLog(); } }

/* 설정 */
function renderAdmSettings(){
  const root=document.getElementById('pane-settings');
  const npcRows=(cfg.npcs||[]).map((n,i)=>`<div class="adm-row"><label>NPC ${i+1}</label><span style="flex:1">${n.type==='video'?'🎬 영상':'🖼 이미지'}</span><button class="adm-btn dng" onclick="delNpc('${n.id}')">삭제</button></div>`).join('') || '<div class="muted-note">등록된 NPC 없음 (없으면 기본 🎴 표시)</div>';
  root.innerHTML=`<div class="adm-card"><h4>기본 설정</h4>
    <div class="adm-row"><label>이벤트명</label><input id="set-name" value="${escAttr(cfg.eventName)}"></div>
    <div class="adm-row"><label>PIN</label><input id="set-pin" value="${escAttr(cfg.adminPin)}"></div>
    <div class="adm-row"><label>유휴(초)</label><input id="set-idle" type="number" min="10" value="${cfg.idleTimeoutSec}"></div>
    <div class="adm-row"><label>음소거</label><button class="adm-btn ${cfg.muted?'dng':'sec'}" onclick="toggleMute()">${cfg.muted?'🔇 음소거 ON':'🔊 소리 ON'}</button></div>
    <button class="adm-btn pri" style="width:100%;margin-top:8px" onclick="saveSettings()">설정 저장</button>
  </div>
  <div class="adm-card"><h4>대기 영상</h4>
    <div class="adm-row"><label>대기영상</label><button class="adm-btn sec" onclick="uploadMedia('idle_video','video/*')">영상 업로드</button><button class="adm-btn dng" onclick="delMedia('idle_video')">삭제</button></div>
    <div class="muted-note">세로 MP4, 무음, 최대 150MB (빠른 로딩엔 50MB↓ 권장)</div>
  </div>
  <div class="adm-card"><h4>뽑기 NPC (여러 개 = 랜덤 표시)</h4>
    ${npcRows}
    <div class="adm-row" style="margin-top:8px"><button class="adm-btn sec" onclick="addNpc('image/*','image')">+ 이미지 추가</button><button class="adm-btn sec" onclick="addNpc('video/*','video')">+ 영상 추가</button></div>
    <div class="muted-note">뽑기 화면마다 랜덤으로 하나 표시 · 영상은 무음 루핑 · 이미지 8MB / 영상 60MB</div>
  </div>
  <div class="adm-card"><h4>배경음악 (BGM · 화면별 루핑)</h4>
    <div class="adm-row"><label>대기</label><button class="adm-btn sec" onclick="uploadMedia('bgm_idle','audio/*')">업로드</button><button class="adm-btn dng" onclick="delMedia('bgm_idle')">삭제</button></div>
    <div class="adm-row"><label>선택</label><button class="adm-btn sec" onclick="uploadMedia('bgm_select','audio/*')">업로드</button><button class="adm-btn dng" onclick="delMedia('bgm_select')">삭제</button></div>
    <div class="adm-row"><label>뽑기</label><button class="adm-btn sec" onclick="uploadMedia('bgm_play','audio/*')">업로드</button><button class="adm-btn dng" onclick="delMedia('bgm_play')">삭제</button></div>
    <div class="muted-note">대기 / IP·라인업(선택) / 뽑기·연출·결과 화면별로 자동 전환·루핑 · mp3/m4a/wav, 최대 30MB</div>
  </div>
  <div class="adm-card"><h4>효과음 (미설정 시 기본음)</h4>
    <div class="adm-row"><label>뽑기음</label><button class="adm-btn sec" onclick="uploadMedia('sfx_pick','audio/*')">업로드</button><button class="adm-btn dng" onclick="delMedia('sfx_pick')">삭제</button></div>
    <div class="adm-row"><label>일반당첨</label><button class="adm-btn sec" onclick="uploadMedia('sfx_win','audio/*')">업로드</button><button class="adm-btn dng" onclick="delMedia('sfx_win')">삭제</button></div>
    <div class="adm-row"><label>스페셜</label><button class="adm-btn sec" onclick="uploadMedia('sfx_special','audio/*')">업로드</button><button class="adm-btn dng" onclick="delMedia('sfx_special')">삭제</button></div>
    <div class="muted-note">스페셜 = A·B·C·행운상 당첨 시 금빛 번개 사운드. 업로드 안 하면 기본 합성음 사용</div>
  </div>`;
}
function saveSettings(){ cfg.eventName=document.getElementById('set-name').value||'컴투스 팝업 쿠지'; cfg.adminPin=document.getElementById('set-pin').value||'0000'; cfg.idleTimeoutSec=Math.max(10,parseInt(document.getElementById('set-idle').value)||30); saveCfg(); bootIdle(); toast('설정 저장됨'); }
function toggleMute(){ cfg.muted=!cfg.muted; saveCfg(); applyMute(); renderAdmSettings(); }
async function uploadMedia(key,accept){
  const f=await pickFile(accept); if(!f)return;
  const isVid = key==='idle_video';
  const isAudio = key.startsWith('bgm_') || key.startsWith('sfx_');
  const cap = isVid?150:(isAudio?30:8);
  if(f.size>cap*1024*1024){ toast(`${cap}MB 이하만 가능`); return; }
  if(isVid || isAudio){ // 대용량 → Blob 원본 저장
    await idbPut(key, f);
    if(isVid) await bootIdle();
    else if(key.startsWith('bgm_')) await loadBgm();
    else await loadSfx();
    toast('업로드 완료'); return;
  }
  const d=await fileToDataURL(f); if(!d)return; await idbPut(key,d); // 이미지 등은 dataURL
  toast('업로드 완료');
}
async function delMedia(key){ await idbDel(key); if(key.startsWith('bgm_')){ const slot=key.slice(4); bgmEl[slot]&&(bgmEl[slot].src=''); } else if(key.startsWith('sfx_')){ const slot=key.slice(4); sfxEl[slot]&&(sfxEl[slot].src=''); } else if(key==='idle_video'){ await bootIdle(); } toast('삭제됨'); }
/* 뽑기 NPC (이미지/영상 여러 개 → 랜덤 표시) */
async function addNpc(accept,type){
  const f=await pickFile(accept); if(!f)return;
  const cap=type==='video'?60:8;
  if(f.size>cap*1024*1024){ toast(`${cap}MB 이하만 가능`); return; }
  const id='n'+Date.now()+Math.floor(Math.random()*1000);
  await idbPut('npc_'+id, f);
  if(!Array.isArray(cfg.npcs)) cfg.npcs=[];
  cfg.npcs.push({id,type}); saveCfg();
  toast('NPC 추가됨'); renderAdmSettings();
}
async function delNpc(id){ await idbDel('npc_'+id); cfg.npcs=(cfg.npcs||[]).filter(n=>n.id!==id); saveCfg(); toast('삭제됨'); renderAdmSettings(); }

/* ════════════════ 유틸 ════════════════ */
function dataURLtoBlob(d){ try{ const [h,b]=d.split(','); const mime=(h.match(/:(.*?);/)||[])[1]||'image/png'; const bin=atob(b); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return new Blob([u],{type:mime}); }catch(e){ return null; } }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escAttr(s){ return String(s==null?'':s).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
let toastTimer=null; function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1800); }

/* 화면 줌/제스처 방지 */
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('dblclick',e=>e.preventDefault(),{passive:false});

/* ════════════════ 부팅 ════════════════ */
(async function boot(){
  await openIDB();
  reconcileStock();
  // npcs 배열 보정 + 기존 단일 NPC(draw_npc) 자동 이전
  if(!Array.isArray(cfg.npcs)) cfg.npcs=[];
  try{
    if(cfg.npcs.length===0){
      const old=await idbGet('draw_npc');
      if(old){ const id='n'+Date.now(); const blob=(typeof old==='string')?dataURLtoBlob(old):old;
        if(blob){ await idbPut('npc_'+id,blob); cfg.npcs.push({id,type:'image'}); saveCfg(); await idbDel('draw_npc'); } }
    }
  }catch(e){}
  await loadAllImages();
  await loadBgm();
  await loadSfx();
  await bootIdle();
  applyMute();
  // 서비스워커: 실제 배포(HTTPS 도메인)에서만 캐싱. localhost 개발 중에는 끄고 항상 최신 파일 사용.
  const isLocal = ['localhost','127.0.0.1','::1',''].includes(location.hostname);
  if('serviceWorker' in navigator){
    if(isLocal){
      try{
        const regs = await navigator.serviceWorker.getRegistrations();
        if(regs.length){
          await Promise.all(regs.map(r=>r.unregister()));
          if(window.caches){ const ks=await caches.keys(); await Promise.all(ks.map(k=>caches.delete(k))); }
          location.reload(); return;
        }
      }catch(e){}
    } else {
      try{ navigator.serviceWorker.register('sw.js'); }catch(e){}
    }
  }
})();
</script>
